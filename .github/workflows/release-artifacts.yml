name: Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare dist assets
        run: |
          mkdir -p dist
          cp target/release/nss-ingestor dist/nss-ingestor-linux-x86_64
          chmod +x dist/nss-ingestor-linux-x86_64
          sha256sum dist/nss-ingestor-linux-x86_64 > dist/checksums.txt

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        run: syft dir:. -o cyclonedx-json=dist/sbom.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless OIDC)
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Verify checksum signature
        run: |
          cosign verify-blob \
            --certificate dist/checksums.txt.pem \
            --signature dist/checksums.txt.sig \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/.+/.+/.github/workflows/release-artifacts.yml@refs/tags/.+" \
            dist/checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nss-ingestor-release-${{ github.ref_name }}
          path: |
            dist/nss-ingestor-linux-x86_64
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/sbom.cdx.json

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nss-ingestor-linux-x86_64
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/sbom.cdx.json
